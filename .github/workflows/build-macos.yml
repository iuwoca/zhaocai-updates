name: Build macOS Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos.yml"
      - "macos-build-trigger.txt"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.0.10"
        required: true
        type: string
      source_ref:
        description: "zhaocai source branch, tag, or commit"
        required: false
        default: "main"
        type: string
      pgy_ref:
        description: "pgy source branch, tag, or commit"
        required: false
        default: "main"
        type: string
      jixing_ref:
        description: "python_qt_jixing source branch, tag, or commit"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15-intel

    steps:
      - name: Checkout update repository
        uses: actions/checkout@v4
        with:
          path: updates
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Checkout zhaocai source
        uses: actions/checkout@v4
        with:
          repository: iuwoca/zhaocai
          ref: ${{ inputs.source_ref || 'main' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: zhaocai

      - name: Checkout pgy source
        uses: actions/checkout@v4
        with:
          repository: iuwoca/pgy
          ref: ${{ inputs.pgy_ref || 'main' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: pgy

      - name: Checkout python_qt_jixing source
        uses: actions/checkout@v4
        with:
          repository: iuwoca/python_qt_jixing
          ref: ${{ inputs.jixing_ref || 'main' }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: python_qt_jixing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: pgy/package-lock.json

      - name: Install pgy Node dependencies
        run: npm ci
        working-directory: pgy

      - name: Import Apple Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_BUILD_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$CERTIFICATE_P12_BASE64" || -z "$CERTIFICATE_PASSWORD" ]]; then
            echo "Apple Developer ID certificate secrets are not configured; macOS package will not be notarized."
            exit 0
          fi
          if [[ -z "$KEYCHAIN_PASSWORD" ]]; then
            KEYCHAIN_PASSWORD="zhaocai-build-keychain"
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > developer_id.p12
          security import developer_id.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Prepare source layout
        run: |
          test -f "$GITHUB_WORKSPACE/python_qt_jixing/jixing_client.py"
          test -f "$GITHUB_WORKSPACE/zhaocai/vendor_sources/python_qt_jixing/browser_cookie_login.py"
          test -f "$GITHUB_WORKSPACE/zhaocai/vendor_sources/jixing/xingtu_client.py"

      - name: Build macOS shell
        env:
          ZHAOCAI_AES_KEY_HEX: ${{ secrets.ZHAOCAI_AES_KEY_HEX }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./build_macos.sh
        working-directory: zhaocai

      - name: Resolve release version
        id: release_version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            value="$INPUT_VERSION"
          else
            value="$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("zhaocai/version.py").read_text(encoding="utf-8")
          match = re.search(r'APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Cannot read APP_VERSION")
          print(match.group(1))
          PY
            )"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: |
          value="$(shasum -a 256 "zhaocai/dist/zhaocai_shell_macos.dmg" | awk '{print tolower($1)}')"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Upload macOS asset to release
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          tag="v${VERSION}"
          if ! gh release view "$tag" --repo iuwoca/zhaocai-updates >/dev/null 2>&1; then
            gh release create "$tag" --repo iuwoca/zhaocai-updates --title "Zhaocai $tag" --notes "Zhaocai $tag"
          fi
          gh release upload "$tag" "zhaocai/dist/zhaocai_shell_macos.dmg" --repo iuwoca/zhaocai-updates --clobber

      - name: Update macOS manifest
        env:
          VERSION: ${{ steps.release_version.outputs.value }}
          SHA256: ${{ steps.sha.outputs.value }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          version = os.environ["VERSION"]
          tag = f"v{version}"
          asset = "招财系统.dmg"
          source_asset = "zhaocai_shell_macos.dmg"
          worker_url = f"https://zhaocai.iuwoca.com/download/{quote(asset)}?v={version}"
          source_github_url = f"https://github.com/iuwoca/zhaocai-updates/releases/download/{tag}/{quote(source_asset)}"
          source_worker_url = f"https://zhaocai.iuwoca.com/download/{quote(source_asset)}?v={version}"
          ghproxy_url = f"https://ghfast.top/{source_github_url}"
          data = {
              "latest_version": version,
              "minimum_version": version,
              "download_url": worker_url,
              "download_urls": [ghproxy_url, worker_url, source_github_url, source_worker_url],
              "proxy_download_url": worker_url,
              "github_download_url": source_github_url,
              "fallback_download_url": source_worker_url,
              "sha256": os.environ["SHA256"],
              "release_url": f"https://github.com/iuwoca/zhaocai-updates/releases/tag/{tag}",
              "title": "招财系统需要更新",
              "message": f"已发布 {version} 版本，请更新后继续使用。",
          }
          Path("updates/latest-macos.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=4),
              encoding="utf-8",
          )
          PY

      - name: Commit macOS manifest
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-macos.json
          if git diff --cached --quiet; then
            echo "latest-macos.json already up to date."
          else
            git commit -m "Update macOS manifest to v${VERSION}"
            git push "https://x-access-token:${SOURCE_REPO_TOKEN}@github.com/iuwoca/zhaocai-updates.git" HEAD:main
          fi
        working-directory: updates
